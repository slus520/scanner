<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner GoDEX</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            transition: background-color 0.3s;
        }
        #reader { 
            width: 100%; 
            max-width: 400px; 
        }
        #result { 
            margin-top: 20px; 
            font-size: 1.2em; 
            text-align: center; 
            padding: 10px;
        }
        /* Узкая рамка фокуса специально под штрихкод */
        #reader__scan_region { 
            border: 2px solid #00ff00 !important; 
            border-radius: 10px;
        }
        /* Убираем лишние элементы библиотеки */
        #reader__dashboard, img { display: none !important; }
    </style>
</head>
<body>

    <div id="reader"></div>
    <div id="result">Наведіть камеру на штрихкод</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const html5QrCode = new Html5Qrcode("reader");

        function onScanSuccess(decodedText) {
            // 1. Останавливаем камеру сразу
            html5QrCode.stop().then(() => {
                
                // 2. Виброотклик (короткий)
                if (navigator.vibrate) navigator.vibrate(100);
                
                // 3. Визуальный успех
                document.body.style.backgroundColor = "#006400"; // Темно-зеленый
                document.getElementById('result').innerHTML = 
                    `<span style="color: #00ff00; font-size: 1.5em; font-weight: bold;">✅ ГОТОВО!<br>${decodedText}</span>`;

                // 4. Отправляем код боту через 0.8 сек
                setTimeout(() => {
                    tg.sendData(decodedText);
                }, 800);

            }).catch(err => console.error("Stop failed", err));
        }

        const config = { 
            fps: 30, // Увеличиваем частоту для более плавного захвата
            qrbox: { width: 260, height: 120 }, 
            aspectRatio: 1.0,
            // Добавляем жесткие требования к качеству картинки:
            videoConstraints: {
                facingMode: "environment",
                width: { min: 1280, ideal: 1920 }, // Просим Full HD
                height: { min: 720, ideal: 1080 },
                frameRate: { ideal: 30 }
            }
        };

        // Запуск с расширенными настройками
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess
        ).catch(err => {
            // Если Full HD не поддерживается, пробуем обычный режим
            console.log("Full HD failed, trying auto");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 250, height: 120 } }, onScanSuccess);
        });
    </script>
</body>
</html>
