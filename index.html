<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner GoDEX</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            transition: background-color 0.3s;
        }
        #reader { 
            width: 100%; 
            max-width: 400px; 
        }
        #result { 
            margin-top: 20px; 
            font-size: 1.2em; 
            text-align: center; 
            padding: 10px;
        }
        /* Узкая рамка фокуса специально под штрихкод */
        #reader__scan_region { 
            border: 2px solid #00ff00 !important; 
            border-radius: 10px;
        }
        /* Убираем лишние элементы библиотеки */
        #reader__dashboard, img { display: none !important; }
    </style>
</head>
<body>

    <div id="reader"></div>
    <div id="result">Наведіть камеру на штрихкод</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const html5QrCode = new Html5Qrcode("reader");

        function onScanSuccess(decodedText) {
            html5QrCode.stop().then(() => {
                if (navigator.vibrate) navigator.vibrate(100);
                document.body.style.backgroundColor = "#006400";
                document.getElementById('result').innerHTML = 
                    `<span style="color: #00ff00; font-size: 1.5em; font-weight: bold;">✅ ГОТОВО!<br>${decodedText}</span>`;
                setTimeout(() => { tg.sendData(decodedText); }, 800);
            });
        }

        // Специальные настройки для iPhone 13/15
        const config = { 
            fps: 25, 
            qrbox: { width: 220, height: 120 }, // Еще немного уменьшили рамку
            aspectRatio: 1.0,
            videoConstraints: {
                facingMode: "environment",
                // Просим меньшее разрешение, чтобы камера не "думала" слишком долго
                width: { ideal: 1280 }, 
                height: { ideal: 720 }
            }
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
            // ФИНТ ДЛЯ iPhone 13/15: Принудительно просим камеру перефокусироваться
            const track = html5QrCode.getRunningTrack();
            if (track && track.getCapabilities().zoom) {
                // Устанавливаем легкий зум 1.5x — это заставляет линзу 13/15 iPhone 
                // "проснуться" и сфокусироваться на штрихкоде
                track.applyConstraints({
                    advanced: [{ zoom: 1.5 }]
                });
            }
        })
        .catch(err => {
            document.getElementById('result').innerText = "Помилка камери.";
        });
    </script>
</body>
</html>
