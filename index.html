<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zebra Laser Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; padding: 0; 
            background-color: #000; 
            color: white; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
            transition: background-color 0.2s;
        }
        #reader { width: 100%; max-width: 500px; }
        #result { 
            margin-top: 20px; 
            padding: 10px; 
            text-align: center; 
            font-size: 1.2em;
            z-index: 10;
        }
        /* Узкая рамка-луч как у настоящего сканера */
        #reader__scan_region { 
            border: 2px solid #ff0000 !important; 
            border-radius: 4px;
            box-shadow: 0 0 15px #ff0000;
        }
        /* Прячем лишние элементы интерфейса библиотеки */
        #reader__dashboard, img, button { display: none !important; }
    </style>
</head>
<body>

    <div id="reader"></div>
    <div id="result">Тримайте телефон далі (30-40 см)</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const html5QrCode = new Html5Qrcode("reader");

        function onScanSuccess(decodedText) {
            // Мгновенная остановка
            html5QrCode.stop().then(() => {
                if (navigator.vibrate) navigator.vibrate(100);
                
                document.body.style.backgroundColor = "#004d00";
                document.getElementById('result').innerHTML = 
                    `<b style="color: #00ff00; font-size: 1.4em;">✅ ЗЧИТАНО:<br>${decodedText}</b>`;

                setTimeout(() => {
                    tg.sendData(decodedText);
                }, 700);
            }).catch(err => console.error(err));
        }

        const config = { 
            fps: 30, 
            // Узкая полоска: ширина 280, высота всего 60
            qrbox: { width: 280, height: 60 },
            aspectRatio: 1.0,
            videoConstraints: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
            const track = html5QrCode.getRunningTrack();
            const capabilities = track.getCapabilities();
            
            // Принудительный зум 2.0x — решение проблемы фокуса 13/15 iPhone
            if (capabilities.zoom) {
                track.applyConstraints({
                    advanced: [{ zoom: 2.0 }]
                }).catch(e => console.log("Zoom error:", e));
            }
        })
        .catch(err => {
            document.getElementById('result').innerText = "Помилка камери";
        });
    </script>
</body>
</html>
